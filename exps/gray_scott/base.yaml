experiment: gray_scott
seed: 123

data_generation:
  # Domain for u=(u,v) and theta=(f,k)
  domain:
    u_bounds:
      - [-0.2, 1.2]
      - [-0.2, 1.2]
    theta_bounds:
      - [0.0, 0.3]
      - [0.0, 0.08]
  delta:
    delta_min: 1e-3
    delta_default: 0.20
  incomplete_rate: 0.0
  incomplete_mode: random_solution
  train:
    N_obs: 1000
    N_random: 200
    method_theta: uniform
    method_u: uniform
  test:
    N_obs: 600
    N_random: 200
    method_theta: uniform
    method_u: uniform
  outputs:
    out_dir: data
    data_train_npz: gray_scott_data_train.npz
    data_test_npz: gray_scott_data_test.npz
    obs_train_pkl: gray_scott_obs_train.pkl
    obs_test_pkl: gray_scott_obs_test.pkl

training:
  device: auto
  num_workers: 0
  phi:
    enabled: true
    batch_size: 8192
    epochs: 400
    lr: 1.0e-3
    model:
      embed_dim: 8
      width: [30, 20]
      depth: [4, 3]
    eta:
      scale: 1.5
      cap: 0.01
  count:
    enabled: true
    batch_size: 1024
    epochs: 500
    lr: 1.0e-3
    model:
      width: 256
      depth: 3
  stability_classifier:
    enabled: true
    batch_size: 1024
    epochs: 300
    lr: 1.0e-3
    model:
      embed_dim: 8
      width: [96, 96]
      depth: [2, 2]
  paths:
    data_dir: data
    out_dir: .
    phi_ckpt: psnn_phi.pt
    count_ckpt: psnn_numsol.pt
    stability_ckpt: psnn_stability_cls.pt
    compat_phi_ckpt: psnn_final.pt
