experiment: feedback_loop
seed: 42

data_generation:
  domain:
    u_bounds:
      - [-1.0, 6.0]
      - [-1.0, 6.0]
    theta_bounds:
      - [1.0, 5.0]
      - [1.0, 5.0]
      - [0.1, 0.3]
      - [0.1, 0.3]
  train:
    N_obs: 9600
    delta_mode: per_theta
    method_theta: uniform
    method_u: resample
    n_local_base: 100
    n_far: 200
    delta_default: 0.25
    delta_min: 0.01
  test:
    N_obs: 2400
    method_theta: uniform
    method_u: resample
    delta_mode: per_theta
    n_local_base: 100
    n_far: 200
    delta_default: 0.25
    delta_min: 0.01
  outputs:
    out_dir: data
    data_train_npz: feedback_loop_data_train.npz
    data_test_npz: feedback_loop_data_test.npz
    obs_train_pkl: feedback_loop_obs_train.pkl
    obs_test_pkl: feedback_loop_obs_test.pkl

training:
  device: auto
  num_workers: 0
  phi:
    enabled: true
    batch_size: 2048
    epochs: 75
    lr: 1e-3
    model:
      embed_dim: 10
      width: [60, 100]
      depth: [2, 3]
    eta:
      scale: 1.5
      cap: 0.1
  count:
    enabled: true
    batch_size: 512
    epochs: 300
    lr: 5.0e-4
    model:
      width: 128
      depth: 4
  stability_classifier:
    enabled: true
    batch_size: 256
    epochs: 100
    lr: 1.0e-3
    model:
      embed_dim: 10
      width: [64, 64]
      depth: [2, 2]
  paths:
    data_dir: data
    out_dir: .
    phi_ckpt: psnn_phi.pt
    count_ckpt: psnn_numsol.pt
    stability_ckpt: psnn_stability_cls.pt
